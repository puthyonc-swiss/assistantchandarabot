# render.yaml
# This tells Render how to run this bot.
# In Render's dashboard, when creating the service, choose "Web Service"
# (NOT "Background Worker") since the bot now uses WEBHOOKS - Telegram
# sends messages TO this service via HTTP, instead of the bot constantly
# asking Telegram for updates. This is what allows it to run on Render's
# FREE tier.

services:
  - type: web
    name: swisskh-report-bot
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python bot.py"
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false   # you'll type the real value in Render's dashboard, not here
      - key: GEMINI_API_KEY
        sync: false   # same - typed directly into Render's dashboard
      # RENDER_EXTERNAL_URL is provided AUTOMATICALLY by Render for Web
      # Services - you do NOT need to add it yourself.
